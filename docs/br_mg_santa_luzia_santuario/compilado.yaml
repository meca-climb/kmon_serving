id: br_mg_santa_luzia_santuario
nome: Santuário
creditos:
- Edição Janeiro 2024
arquivos_markdown:
- titulo: Capa
  conteudo: "# GUIA DE ESCALADA SANTUÁRIO\n\n![Capa](imagens/pagina_0_imagem_0.webp)\n\
    \n**Edição:** Janeiro 2024  \n**Versão:** 1"
- titulo: Como Chegar
  conteudo: '# COMO CHEGAR (HOW TO ACCESS)


    **Coordenadas (coordinates):**

    - **Bar do Sr. João:** [R. Santo Antônio - Ribeirão da Mata, Santa Luzia - MG](https://maps.google.com/?q=-19.7061,-43.8741)

    - **Santuário:** 19°42''25.0"S, 43°52''17.3"W


    **Distâncias (distances):**

    - Belo Horizonte (centro) - 33 km

    - Confins - 24 km


    Estacione o carro perto do **Bar do Sr. João**, e faça o restante da trilha a
    pé. Desça a rua principal até encontrar a linha de trem, e comece uma trilha rápida
    de **900 m**. O Santuário encontra-se à direita da linha de trem.


    *Park your car near **Sr João''s Bar** and walk the rest of the trail. Go down
    the main road until you reach the railway line and start a quick **900 metres**
    walk. The Sanctuary is to the right of the railway line.*


    ![Mapa de Acesso](imagens/pagina_2_imagem_0.webp)

    ![Trilha](imagens/pagina_2_imagem_1.webp)

    ![Placa Pare](imagens/pagina_2_imagem_2.webp)'
- titulo: Comércio Local
  conteudo: '# COMÉRCIO LOCAL (LOCAL BUSINESS)


    ## BAR DO SR. JOÃO


    - **Endereço (Address):** Rua Santo Antônio - Ribeirão da Mata, Santa Luzia -
    MG

    - **Recomendações:** Pastel frito na hora, sucos, açaí, refrigerantes, cerveja
    e almoço (necessita agendar com antecedência).


    *Recommendations: freshly fried pastel, juices, açaí, sodas, beer and lunch (you
    need to make an appointment in advance).*


    ![Sr. João 1](imagens/pagina_3_imagem_0.webp)

    ![Sr. João 2](imagens/pagina_3_imagem_1.webp)

    ![Sr. João 3](imagens/pagina_3_imagem_2.webp)'
- titulo: Informações
  conteudo: '# INFORMAÇÕES (INFORMATIONS)


    Dentro do domo do Santuário não chove, e só bate sol no início da manhã, por isso
    é um local perfeito para escalada durante todo o ano.


    *It doesn''t rain inside the Sanctuary''s dome and the sun only hits it early
    in the morning, making it a perfect place for climbing all year long.*


    - Respeite o local, ele é sagrado para a comunidade. (*Respect the area, it is
    sacred to the community.*)

    - Leve o seu lixo ao sair. Respeite a fauna e flora do lugar. (*Take out your
    litter when you leave. Respect the local fauna and flora.*)

    - Não escreva nas pedras. (*Don''t write on the rocks.*)

    - Somente pratique escalada se tiver o domínio da técnica e do uso dos equipamentos.
    (*Only climb if you have mastered the technique and use of the equipment.*)


    ![Escalada 1](imagens/pagina_4_imagem_0.webp)

    ![Logo Climb](imagens/pagina_4_imagem_1.webp)

    ![Logo J Gariglio](imagens/pagina_4_imagem_2.webp)

    ![Logo v15](imagens/pagina_4_imagem_3.webp)'
- titulo: Como Usar Este Guia
  conteudo: '# COMO USAR ESTE GUIA (HOW TO USE THIS GUIDE)


    Este Guia tem a função de informar, facilitar e divulgar as vias de escalada do
    Santuário.

    *The purpose of this Guide is to inform, facilitate and disseminate the Sanctuary''s
    climbing routes.*


    Todas as vias possuem placas de identificação em sua base. As vias são divididas
    em partes (P1, P2, P3, P4), cada uma tem um grau que é cumulativo com a parte
    anterior.

    *All the routes have nametags at their bases. The tracks are divided into parts
    (P1, P2, P3, P4), each one has a grade that is cumulative with the previous part.*


    ![Guia de Legenda](imagens/pagina_5_imagem_0.webp)'
- titulo: Mapa dos Setores
  conteudo: '# MAPA DOS SETORES (MAP OF THE SECTORS)


    O Santuário é dividido em três setores principais:

    1. **Setor Clube da Luta**

    2. **Setor Santa Linea**

    3. **Setor Democracia**


    ![Mapa Geral](imagens/pagina_6_imagem_0.webp)'
