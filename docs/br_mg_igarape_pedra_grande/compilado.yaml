arquivos_markdown:
- titulo: Capa
  conteudo: '![Capa](raw_pdf_contents/pagina_0.png)


    # Igarameca Climb

    ## Croqui 2024 - Escaladas Esportiva - Pedra Grande'
- titulo: Introdução
  conteudo: '# ATENÇÃO


    Este croqui é apenas um auxílio de consulta a localização, não serve como instruções
    a prática da escalada.

    **Não nos responsabilizamos pelas informações aqui contidas, são apenas ponto
    de vista.**


    Os nomes das vias, seus respectivos conquistadores e a graduação sugerida para
    cada uma delas são resultados de uma pesquisa oral conduzida entre os escaladores
    que frequentam o pico, e com base em registros fragmentados sobre o tema.

    O resultado desse trabalho pode eventualmente conter erros, os quais peço que
    não sejam entendidos como desrespeito.

    O objetivo é documentar e divulgar a prática da escalada no centro-oeste mineiro
    da maneira mais exata possível.


    # OBSERVAÇÕES


    Como algumas vias são de conquistadores(as) desconhecidos(as) foi utilizado apelido
    + (*) para identificá-las.

    Caso encontre algum engano nos dados citados neste croqui, peço que me envie a
    correção.

    Terei satisfação em atendê-lo, pois todos os envolvidos com a escalada tem a ganhar
    com o aprimoramento desse trabalho.


    [@igarameca](https://www.instagram.com/igarameca)


    Muito obrigado aos conquistadores e conquistadoras das linhas (rotas) de escalada,
    **GRATIDÃO** a vocês sempre!!!

    Obrigado a todas as pessoas que contribuíram para o desenvolvimento desse excepcional
    parque natural de escaladas.

    Obrigado em especial ao Bruno Berbari e Warleson Campos (Bunitin) na captação
    e catalogação das vias.


    ---


    Organização, Revisão e Graduação sugerida das vias: **Equipe Igarameca**

    arte/desenhos/produção: **alexsandro**

    1ª versão - Junho/2024 (vias esportivas) 24 páginas'
- titulo: Regras e Ética
  conteudo: '# SEJA CONSCIENTE!


    - **UTILIZE APENAS AS TRILHAS PRINCIPAIS;**

    - **As grutas não são banheiros!** Faça suas necessidades fisiológicas em casa,
    caso não consiga segurar, faça longe das pedras e cubra com folhas ou terra;

    - **Leve todo seu lixo de volta** e o lixo de outros visitantes descuidados (inclusive
    papel higiênico, garrafas plásticas, bitucas, pontas, papel de bala...);

    - Os animais locais e plantas nativas devem permanecer em seus lugares. Lembre-se
    que eles estão em seu habitat natural e precisam ser respeitados;

    - Os animais domésticos (ex. cães) não devem ser trazidos a este local, desta
    forma, você os protege de doenças silvestres e vice-versa;

    - Fogueiras além de provocar queimadas, danificam o local;

    - Estacione de maneira adequada e no local adequado a fim de não atrapalhar o
    fluxo de outros veículos e/ou caminhões;

    - Utilize equipamentos de segurança e verifique seu estado de conservação;

    - Cuidado com pedras soltas principalmente em setores e vias novas;

    - Antes de conquistar uma via de escalada entre em contato com a Equipe Igarameca.


    [@igarameca](https://www.instagram.com/igarameca)'
- titulo: História de Igarapé
  conteudo: '# IGARAPÉ - MG


    Igarapé localiza-se na Região Metropolitana de Belo Horizonte, é um município
    brasileiro do estado de Minas Gerais. Seu nome que vem do tupi-guarani, e significa
    "caminho da canoa", enquanto cidade teve suas bases iniciais de ocupação do território
    no "garimpo de ouro" no distrito de São Joaquim de Bicas e posteriormente na agropecuária.
    Certamente centenas de anos antes, por aqui já existiam fazendas e diversas famílias
    com residências fixas.


    Com base em documentos podemos afirmar que por volta de 1830, já existia muita
    gente vivendo no próprio local que seria mais tarde o Barreiro (nesta época, o
    Barreiro nem era propriamente um povoado, era um simples aglomerado de pequenas
    e velhas fazendas mais ou menos perto umas das outras) e, posteriormente, denominada
    cidade de Igarapé.


    Portanto, a ideia de que a origem da cidade remonta a estas antigas fazendas existentes,
    não pode ser tomada como o marco da fundação de Igarapé, afinal, em tempos mais
    longínquos viviam os povos indígenas, verdadeiros habitantes originários da região,
    bem como de todo o continente.


    ![História Igarapé](raw_pdf_contents/pagina_3.png)'
- titulo: Complexo Pedra Grande
  conteudo: '# COMPLEXO PEDRA GRANDE


    A Pedra Grande, um marco histórico e geográfico de Igarapé, tem sido uma referência
    importante para viajantes ao longo dos anos. No século XX, a mineração de ferro
    ameaçou a integridade da Serra do Itatiaiuçu, o que levou à criação da Área de
    Proteção Especial (APE) e, posteriormente, da Área de Proteção Ambiental (APA)
    Municipal de Igarapé, visando preservar os mananciais de abastecimento humano.


    A Pedra Grande possui características escultóricas naturais que atraem visitantes,
    oferece belezas naturais, como matas e fontes d''água, que aumentam o turismo
    e promovem atividades de aventura na região. No entanto, a visitação descontrolada
    tem causado depredação e poluição. Esta atitude é repudiada por escaladores que
    frequentam o local e se empenham em recolher seus próprios lixos e os de visitantes
    descuidados.


    O município de Igarapé decretou o tombamento sob proteção Municipal do bem cultural
    denominado "Conjunto Natural e Paisagístico da Pedra Grande" que também é cartograficamente
    importante, situada na Serra do Itatiaiuçu, compondo a zona limítrofe entre Igarapé,
    Itatiaiuçu e Mateus Leme. A área tem significância econômica devido às jazidas
    de ferro e manganês, sendo notável por sua beleza cênica e valor didático.


    O bem natural tem importância regional estratégica por ser berço de nascentes
    responsáveis pela recarga hídrica de um dos aquíferos que abastecem a região metropolitana
    de Belo Horizonte. A área faz parte do Quadrilátero Ferrífero, uma província geológica
    conhecida por seus depósitos e minas de ferro, manganês, ouro, calcário e bauxita,
    recursos naturais amplamente explorados pelas mineradoras que se instalaram na
    região.'
- titulo: Sobre Igarameca
  conteudo: '# IGARAMECA


    Não se sabe ao certo quando começou a escada na região, estudos em andamento apontam
    entre as décadas de 80/90. Há três anos, um grupo de escaladores de Belo Horizonte
    se reuniu com a ideia de transformar o Complexo da Pedra Grande em um dos principais
    picos de escalada da região. Foi assim que nasceu o @igarameca, numa prosa após
    um dia de muito climbing no pé da pedra.


    Esse sonho tem se tornado realidade dia após dia, com muito trabalho, dedicação
    e claro, muita escalada boa. Atualmente o complexo possui mais de 150 vias esportivas
    e 500 boulders, além de rotas tradicionais e móveis, todas esculpidas na rocha
    única de Itabirito.


    Os croquis são os "mapas" que guiam os praticantes da escalada no local, sendo
    um facilitador para a pratica do esporte e acreditamos resultar em um ganho a
    todos. E para que cada vez mais escaladores possam usufruir e desbravar o potencial
    do local, inicialmente estamos lançando este **CROQUI DOS SETORES E VIAS DE ESCALADA
    ESPORTIVA** catalogadas no complexo da Pedra Grande em Igarapé/MG, atualizações
    serão adicionadas no decorrer do projeto... "e as vias trad, móvel e os boulders!?".
    C A L M A turma, anos e anos de desenvolvimento, muita informação a receber e
    em breve teremos um livro gigante repleto de informações e detalhes!!! Vamoooo!!!


    ![Sketchbook Igarameca](raw_pdf_contents/pagina_5.png)'
