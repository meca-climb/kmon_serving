id: br_mg_barao_de_cocais_cambotas
nome: Cambotas
creditos:
- Aloysio Carvalho
- Gustavo Vianna
arquivos_markdown:
- titulo: Capa
  conteudo: '![Capa](raw_pdf_contents/pagina_0.png)


    # CAMBOTAS

    Serra de Ita-marãen ou Serra do Garimpo - Canela de Ema


    Croquiteca edição 07/2019


    **Localização:** 19°53''52.90" S, 43°32''11.88" W

    **Fotos e Croquis:** Aloysio Carvalho e Gustavo Vianna


    O guia inclui um mapa de acesso detalhado a partir de Belo Horizonte, Vitória,
    Caeté, Sabará e Barão de Cocais.'
- titulo: Mapas Gerais
  conteudo: '![Panorama](raw_pdf_contents/pagina_1.png)

    *Panorama geral da Serra de Cambota indicando os principais setores.*


    ![Topo Geral](raw_pdf_contents/pagina_2.png)

    *Topo ilustrado detalhado da parede principal.*


    ![Aresta Eletrizante Ação](raw_pdf_contents/pagina_5.png)

    *Registro fotográfico das vias Aresta Eletrizante e Totalmente Demais.*


    ![Felinas Foto](raw_pdf_contents/pagina_14.png)

    *Croqui fotográfico da Parede das Felinas.*'
- titulo: Informações Gerais
  conteudo: '![Canela de Ema](raw_pdf_contents/pagina_15.png)


    ## Canela de Ema Adventure Park

    A Serra da Cambota está localizada em uma área de preservação e faz parte do complexo
    do Canela de Ema Adventure Park.


    - **Localização:** Caeté - MG

    - **Coordenadas GPS:** 19°53''52.90"S, 43°32''11.88"W

    - **Contato:** WhatsApp e Site disponíveis na página original.


    O local oferece infraestrutura de pousada, lago e diversas atividades de aventura
    além da escalada.'
