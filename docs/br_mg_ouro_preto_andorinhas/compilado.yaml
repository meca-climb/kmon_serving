  conteudo: '# Mapas Gerais - Parque Natural Municipal das Andorinhas


    ![Mapa Geral](imagens/pagina_1_imagem_0.webp)


    ## Legenda do Mapa


    ### Setores de Escalada

    - Pedra do Arco

    - Campo Escola

    - Tchau Querida

    - Pedra Branca


    ### Pontos de Interesse

    - Mirante Pedra do Jacaré

    - Cachoeira das Andorinhas

    - Sede do Parque


    ### Trilhas

    - **Trilha Setores de Escalada**: Trilha principal de acesso aos setores.

    - **Trilha das Andorinhas**

    - **Trilha da Folhinha**

    - **Trilha dos Pelados**

    - **Trilha do Véu das Noivas**

    - **Trilha do Vermelhão**

    - **Trilha do Baú**'
