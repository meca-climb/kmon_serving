arquivos_markdown:
- titulo: Capa
  conteudo: '# Croqui Sinuosa - Sete Lagoas, MG


    ![Capa](imagens/pagina_0_imagem_0.webp)


    Este é o croqui da Sinuosa, localizada em Sete Lagoas, MG.'
- titulo: Regras e Segurança
  conteudo: '# Regras e Segurança


    **LEIA**


    - FIQUE ATENTO QUANTO À SEGURANÇA.

    - ASSINE O TERMO DE RESPONSABILIDADE.

    - ANDE SOMENTE PELAS TRILHAS EXISTENTES.

    - ATENÇÃO QUANTO À VIAS INACABADAS.

    - NUNCA FAÇA FOGUEIRAS.

    - EVITE AGLOMERAÇÕES E ALGAZARRAS.

    - LEVE O SEU LIXO E SE O SEU AMIGO DEIXAR, LEVE O DELE TAMBÉM.

    - ATENÇÃO À ABELHAS E ANIMAIS PEÇONHENTOS.

    - MENORES DEVEM ESTAR ACOMPANHADOS DE UM RESPONSÁVEL LEGAL.


    ![Regras](imagens/pagina_1_imagem_0.webp)'
- titulo: Mapas Gerais
  conteudo: '# Mapas Gerais


    ## Mapa Região de Sete Lagoas/MG

    ![Mapa Região](imagens/pagina_2_imagem_0.webp)


    **Rotas de Acesso:**

    - **Rota Rod - A Sinuosa:** [https://goo.gl/maps/efQkmdZEge82](https://goo.gl/maps/efQkmdZEge82)

    - **Rota BH - A Sinuosa:** [https://goo.gl/maps/Y3o6rhNRmVu](https://goo.gl/maps/Y3o6rhNRmVu)


    ---


    ## Trilha de Acesso

    ![Trilha de Acesso](imagens/pagina_3_imagem_0.webp)


    A trilha inicia no Shopping Sete Lagoas. Segue por uma trilha de bicicleta (1200m)
    e depois uma trilha de caminhada (700m) após uma bifurcação onde se deve seguir
    à direita.


    ---


    ## Mapa Geral Sinuosa

    ![Mapa Geral](imagens/pagina_4_imagem_0.webp)


    O mapa mostra a disposição dos setores:

    - Setor Panelinha

    - Setor De Esquerda

    - Boulder Marley

    - Setor 7 Paralelo

    - Setor Sentinela

    - Setor Janelas Pro Abismo (localizado próximo ao Sentinela)

    - Setor Gameleira

    - Setor Death Horse

    - Setor Imigrantes

    - Setor Vale das Sombras

    - Setor Vale Zela

    - Setor 4 Picos

    - Setor Macaúbas

    - Setor Primórdios'
- titulo: Turismo e Equipamentos
  conteudo: '# Informações ao Turista


    ## Melhor Época

    Na Sinuosa o melhor período de visitação é entre os meses de maio a setembro.
    O clima da região se torna perfeito para a prática.


    ## Onde Ficar

    A cidade de Sete Lagoas/MG conta com variadas opções de hospedagem, como: hotéis,
    pousadas e hostel. A cidade ainda não tem abrigo para escaladores.


    ## Alimentação

    Supermercado e restaurante bem ao lado do acesso do pico, no Shopping Sete Lagoas.


    ---


    ## Lugares para Visitar

    - **Serra Santa Helena:** Ótima opção para passeios com a família e amigos.

    - **Gruta Rei do Mato:** Monumento Estadual Natural, uma das mais importantes
    grutas do Brasil, com pinturas rupestres e formações únicas encontradas somente
    aqui e na Espanha.

    - **Lagoas da Cidade:** Grande importância cultural, conhecidas como "A cidade
    dos Lagos Encantados".

    - **Museu do Ferroviário:** Da antiga Estação do Brasil.

    - **Museu Municipal:** Conta a história da cidade desde a época dos tropeiros
    de Fernão Dias.

    - **Museu de Mineralogia:** Um dos mais sofisticados do país.


    ---


    ## Equipamento Sugerido

    - Kit esportivo.

    - Corda de 60m é suficiente, mas a de 70m facilita nas poucas vias mais altas.

    - Para quem curte escalada em móvel, há algumas possibilidades na Sinuosa.


    ## Tipo de Rocha

    Calcário


    ---


    ## Áreas de Escalada Próximos à Sete Lagoas

    - **Gruta do Baú:** 48 km

    - **Gruta da Lapinha:** 55 km

    - **Lapa do Seu Antão:** 51 km

    - **Sítio do Rod:** 58 km

    - **Serra do Cipó:** 112 km

    - **Pedra Rachada:** 102 km


    ![Turismo](imagens/pagina_5_imagem_0.webp)'
- titulo: Curiosidades
  conteudo: '![Curiosidades](imagens/pagina_37_imagem_0.webp)


    A área de escalada está situada na **Fazenda Arizona**, propriedade privada localizada
    no meio urbano da cidade de Sete Lagoas, Minas Gerais. A área está inserida a
    meia encosta da **APA Serra de Santa Helena** (Latitude: 19°27''38.39"S Longitude:
    44°16''42.95"O), onde há a presença de Metacalcarenitos e afloramentos calcários,
    tendo como cobertura vegetal a floresta estacional semidecidual e a parte baixa
    recoberta por sedimentos onde predomina a vegetação característica do Cerrado.


    Em 1937, na primeira edição do livro "As Grutas de Minas Gerais" do antigo IBGE,
    a área em questão é denominada de **"Lapa Arizona"**, onde são descritas várias
    informações do afloramento.


    O nome **"Sinuosa"** foi dado por escaladores locais em meados da década de 90
    devido à curiosa forma da árvore que fica no Setor Primórdios. As primeiras vias
    do pico foram conquistadas há mais de 20 anos, mas só em 2013 o pico voltou a
    ser desenvolvido com abertura de novas vias.


    Existe um tipo de **caverna vertical** explorada por espeleólogos com mais de
    100 metros de profundidade, com vários salões em seu decorrer, formações impressionantes
    de "esponjas calcárias", entre outras curiosidades sobre o terreno "karst".'
- titulo: Considerações Finais
  conteudo: '![Considerações Finais](imagens/pagina_38_imagem_0.webp)


    A área de escalada esportiva **"Sinuosa"** apresenta baixos índices de degradação
    ambiental relacionados à prática do esporte. Entre os aspectos ambientais analisados,
    a abertura de trilhas e novos setores é o que apresenta um maior coeficiente de
    intervenção, devido ao fato da supressão de vegetação e exposição do solo.


    Conclui-se ainda que a área apresenta grande potencial para aberturas de novos
    setores, sendo feita uma estimativa da possibilidade de chegar a **mais de 150
    vias**. É importante ressaltar que a presença de escaladores no local contribui
    de forma positiva, inibindo a presença de caçadores, vândalos e a depredação da
    fauna, flora e do patrimônio espeleológico.


    Além da área mencionada, existem outros locais de destaque no cenário nacional
    para a prática da escalada na cidade de Sete Lagoas, sendo eles: a **"Área de
    Escalada Gruta Rei do Mato"**, localizada no Monumento Natural Estadual Gruta
    Rei do Mato, e a **"Área de Escalada Esportiva Roxane"**, localizada em propriedade
    particular na zona rural do município. Porém, em ambas a prática da escalada está
    proibida. Devido a este fato, a possibilidade de novos trabalhos envolvendo a
    questão ambiental e a prática do esporte se mostra promissora.'
