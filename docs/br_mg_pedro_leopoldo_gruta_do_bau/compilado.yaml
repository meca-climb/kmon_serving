arquivos_markdown:
- titulo: Capa
  conteudo: '# GUIA DE ESCALADA GRUTA DO BAÚ


    **PEDRO LEOPOLDO – MG**

    **5ª Edição - Agosto/2025**


    **CHRISTIAN COSTA**


    ![Capa](imagens/capa_p0_i15.webp)'
- titulo: Aviso
  conteudo: '# AVISO


    A escalada é um esporte de risco, manuais e guias não substituem instrução e supervisão
    profissional. Somente com equipamentos de qualidade e instrução adequada se consegue
    minimizar os riscos do esporte.


    Se você ainda não sabe escalar procure uma escola com instrutores qualificados.
    Evite aprender na base dos erros e acertos, pois acidentes em escalada são potencialmente
    graves sendo fundamental a instrução profissional para perfeita compreensão das
    diversas técnicas de segurança.


    As informações contidas neste guia servem apenas para indicar os locais mais frequentados
    e suas principais vias de escalada, não assegurando a integridade física das proteções
    fixas das vias indicadas. Os autores também não se responsabilizam pela utilização
    ou má interpretação das informações contidas neste guia.


    Esteja avisado que alguns dos dados contidos no guia são subjetivos (como o grau
    de dificuldade por exemplo), e a utilização deste guia implica que você está ciente
    que, morte ou acidentes graves são riscos inerentes da escalada em rocha, assumindo
    assim toda a responsabilidade pelos seus atos.


    A utilização de capacete é recomendável durante toda a permanência nas áreas de
    escalada.


    Este guia foi feito por escaladores e não tem qualquer objetivo financeiro. Como
    qualquer trabalho está sujeito a erros e acertos. Qualquer dúvida, sugestão ou
    elogio são muito bem vindos.


    Lembre-se sempre:


    **A SEGURANÇA deve ser sempre o aspecto mais importante em toda e qualquer atividade
    de escalada**


    **VOCÊ É O MAIOR RESPONSÁVEL POR SUA SEGURANÇA, RESPEITE OS SEUS LIMITES E SEJA
    PRUDENTE.**'
- titulo: História
  conteudo: '# História


    O maciço do Baú está localizado no município de Pedro Leopoldo a cerca de 50 km
    de Belo Horizonte. O local está dentro dos limites da APA Carste de Lagoa Santa
    em uma propriedade particular, abrigando inúmeras cavernas e formações rochosas.
    Os espeleólogos encontraram nestas cavernas vários fósseis além de diversos espeleotemas
    de rara beleza.


    ![Maciço do Baú](imagens/historia_p0_i6.webp)


    O nome de Gruta do Baú advém da formação rochosa presente no maciço que se assemelha
    a uma fechadura.


    O Baú começou a ser frequentado pelos escaladores na década de noventa, quando
    Roberto Lincoln e Rômulo Brandão, ambos recém formados em um curso de escalada,
    visitaram o local e perceberam o potencial deste, abrindo lá suas primeiras vias
    de escalada, hoje as clássicas “Retorno de Pitú” e “Sentinela”.


    ![Poliana Lisboa – Via Arcanjo Gabriel](imagens/historia_p0_i7.webp)


    No princípio seus conhecimentos sobre conquistas e grampeações eram poucos, porém
    eles superaram esta falta de conhecimento e equipamentos adequados com uma boa
    dose de criatividade, conquistando diversas vias.


    O proprietário atual é o empresário José Celso, um apaixonado pela natureza e
    por todo o complexo do Baú que preza pela boa convivência e faz de tudo para que
    os escaladores se sintam em casa ao frequentarem sua fazenda. Chegado a uma boa
    prosa, os encontros com ele sempre são recheados de boas histórias e risadas.'
- titulo: Acesso
  conteudo: '# Acesso


    O Baú está localizado no município de Pedro Leopoldo, no distrito de Lagoa de
    Santo Antônio, há cerca de 50 km de Belo Horizonte.


    Na saída de Belo Horizonte para o Aeroporto internacional de Confins (MG-010)
    entrar no trevo para a cidade de Pedro Leopoldo, seguindo pela MG 424. Após passar
    por Pedro Leopoldo continuar na rodovia em direção a Matozinhos e virar à direita
    no trevo da correia transportadora de minério que atravessa a estrada até o distrito
    de Lagoa de Santo Antônio.


    Seguir em direção ao distrito de Fidalgo, passando próximo a uma lagoa e chegando
    até a Rua Pacífico Rodrigues.


    **Coordenadas geográficas da entrada:** -19º33''12.5 -43º59''23.4


    ![Vista da saída na MG 424](imagens/acesso_p0_i6.webp)

    ![Trajeto até entrada do Baú](imagens/acesso_p0_i8.webp)

    ![Vista da entrada da Fazenda](imagens/acesso_p0_i10.webp)'
- titulo: Regras de Visitação
  conteudo: '# Regras de Visitação


    Como todas as áreas de escalada, os princípios do mínimo impacto devem ser observados
    e a segurança é responsabilidade única e exclusiva de cada um.


    A área de escalada no Baú é uma área particular, pertencente ao Sr. José Celso.
    Para que continue aberta a escalada é fundamental observarmos algumas regras de
    visitação:


    - Taxa de visitação: R$ 25,00 (Vinte e cinco reais);

    - **Obrigatório a utilização de Capacete e cada visitante deve portar o seu próprio
    equipamento.**

    - **Obrigatório que o praticante faça parte do grupo de whatsapp de informações
    do Baú, para que tenha ciência das regras e condutas para o local, bem como informes
    pertinentes da área.**


    ![Larissa Correa dando segurança para Bruno Lapertosa no setor Segundo Andar](imagens/regras_visitacao_p0_i6.webp)


    - Horário de funcionamento: 08:00 às 18:00, todos os dias da semana para escalada;

    - Deixar qualquer portão, porteira ou colchete fechado;

    - É proibido retirar qualquer objeto do sítio (pedras, mudas, flores, etc...);

    - Se manter sempre nas trilhas demarcadas;

    - Não fazer qualquer modificação ou conquista de vias sem comunicar o grupo de
    trabalho responsável pelo local;


    ![Marina Rocha - Via Fusca Azul](imagens/regras_visitacao_p0_i7.webp)


    **OBSERVAÇÃO:** A quantidade de proteções expressa no guia conta as proteções
    da via mais o Top com 1 ou 2 proteções. Por exemplo, se está expresso 6 + 2 no
    campo proteções, são 6 chapeletas ou grampos + o top rope.


    **OBSERVAÇÃO 2:** As vias com proteções móveis ou mistas estão assinaladas de
    vermelho no guia. O grupo de trabalho vem duplicando os top ropes dessas vias
    e colocando os nomes nas bases.


    **OBSERVAÇÃO 3:** Alguns locais tem Topropes montados baixos para cursos de escalada.
    Marcados em amarelo nos croquis.


    **É expressamente proibido a entrada na gruta sem o acompanhamento de um guia
    da fazenda.**'
- titulo: Opções de Hospedagem
  conteudo: '# Opções de Hospedagem


    ### Casa ou quartos para alugar na própria Gruta do Baú

    ![Casa ou quartos para alugar na própria Gruta do Baú](imagens/opcoes_hospedagem_p0_i6.webp)

    O complexo da fazenda conta com uma casa que pode ser alugada por um grupo ou
    somente os quartos isoladamente. Fica bem ao lado da entrada e conta ainda com
    uma piscina privativa e deck panorâmico.

    **CONTATOS**

    Instagram: @grutadobau

    WhatsApp - José Celso: (31) 98771-1655


    ### Rupestre da Lapa

    ![Rupestre da Lapa](imagens/opcoes_hospedagem_p0_i7.webp)

    Abrigo de escalada – Hospedagem com ou sem refeições, estacionamento, área de
    camping, quartos coletivos, duplos e suítes. Serve café da manhã, almoço, lanche
    e jantar mediante agendamento.

    **CONTATOS**

    Instagram: @hospedagemrupestredalapa

    WhatsApp - Helon ou Denise: (31) 99807-8392


    ### Escalarte

    ![Escalarte](imagens/opcoes_hospedagem_p0_i8.webp)

    Refúgio de escalada – Hospedagem a menos de 1 km da Gruta da Lapinha e 13 km da
    Gruta do Baú. Oferece quartos coletivos, duplos e suítes.

    ![Hospedagem](imagens/opcoes_hospedagem_p0_i9.webp)

    **CONTATOS**

    Instagram: @escalar_te

    WhatsApp – André Braga (Dedé): (31) 99831-3107'
- titulo: Outras atrações
  conteudo: '# Outras atrações e comodidades da Gruta do Baú


    A área de escalada da Gruta do Baú se localiza dentro da Fazenda Gruta do Baú,
    que por si só, já é uma atração à parte. A Fazenda conta com diversas outras atrações
    e comodidades, se tornando um passeio para toda a família. Podemos destacar:


    ![Restaurante com café da manhã, almoço e petiscos](imagens/outras_atracoes_p0_i10.webp)


    ![Bike Park com 18 km de trilhas](imagens/outras_atracoes_p0_i7.webp)


    ![Alimentação para os animais](imagens/outras_atracoes_p0_i6.webp)


    ![Recreação infantil](imagens/outras_atracoes_p0_i9.webp)


    ![Parquinho](imagens/outras_atracoes_p0_i8.webp)'
- titulo: Manutenção
  conteudo: '# Manutenção e conquista de novas vias


    A grande maioria das vias do maciço do Baú são da década de 90, quase todas atingindo
    os 20 anos desde a conquista... Devido a idade das vias muitas proteções se deterioraram
    com o tempo e não se encontram em condições de utilização. Com o intuito de proporcionar
    uma escalada de qualidade e sobretudo segura, um pequeno grupo de escaladores
    locais está realizando de maneira gradativa a substituição das proteções e duplicando
    os top ropes.


    Foi criado um grupo de trabalho em 2020 com o intuito de intermediar a abertura
    de novas vias junto ao proprietário. A abertura se dará de forma lenta e gradual,
    para diminuir os impactos gerados na área.


    O GT Baú vem variando os membros ao longo do tempo e em agosto de 2025 é composto
    pelos escaladores: André Braga, Christian Costa, Igor Andrade, Iule Ornelas, Marcelo
    Novais, Márcio Vasconcelos, Roberto Lincoln, Sandro Almeida e Wilson Souza “Professor”.


    ![Manutenção na Rayovac](imagens/manutencao_p0_i6.webp)

    ![Mariana Costa ajudando a colocar o nome na via aberta em sua homenagem](imagens/manutencao_p0_i12.webp)

    ![Manutencao na Sentinela 1](imagens/manutencao_p0_i8.webp)'
