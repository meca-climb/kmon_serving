- titulo: Como Chegar
  conteudo: '# Como chegar:


    R. Nossa Sra. do Rosário, 333 - Lapinha, Lagoa Santa - MG.


    **Distâncias:**

    * Belo Horizonte (centro) 50 km

    * Rio de Janeiro - 494 km

    * São Paulo - 630 km

    * Brasília - 710 km


    **De ônibus:**

    Saindo da Rodoviária de Belo Horizonte: Pegar o ônibus 5782 até Rodoviária de
    Lagoa Santa, lá linhas 3003/3004 e descer no ponto mais próximo da Igreja Nossa
    Sra. do Rosário, a 100m do Sítio do Rod.


    **Saindo do Aeroporto:**

    Pegar sentido Lagoa Santa, seguir para a Lapinha o Sítio está a 1 km da Gruta
    da Lapinha.


    ![Mapa Como Chegar](imagens/pagina_12_imagem_0.webp)'
- titulo: Como usar este guia
  conteudo: '# Como usar este guia:


    * Este Guia vem com a finalidade de facilitar, informar e divulgar as vias de
    escalada no Sítio do Rod.

    * Nele as vias vem divididas em circuitos de cores, cada cor corresponde a uma
    graduação.

    * Traz também informações rápidas sobre o estilo da escala da via seja ela esportiva
    ou móvel.


    **Legenda das cores:**

    * 4º e 5º grau: Amarelo

    * 6º grau: Verde

    * 7º grau: Azul

    * 8º grau: Roxo

    * 9º grau: Vermelho

    * 10º grau: Preto


    ![Legenda](imagens/pagina_13_imagem_0.webp)

    V: Variante

    B: Boulders

    T: Travessias

    o: Vias Fixas

    +: Vias Móveis'
- titulo: Mapa dos Setores
  conteudo: '# Mapa dos setores:


    ![Mapa dos Setores](raw_pdf_contents/pagina_14.png)

    O Sítio do Rod possui três setores principais: G1, G2 e G3.

    A caminhada do estacionamento até a base da rocha leva cerca de cinco minutos.

    Existem também vários boulders e travessias espalhados pelos setores.'
