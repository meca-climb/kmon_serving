- titulo: A Escalada
  conteudo: '![A Escalada](imagens/pagina_5_imagem_0.webp)

    O Sítio do Rod é perfeito para iniciar crianças na escalada e vivências em ambientes
    naturais.

    Foto: Portugal Braga


    # A Escalada:


    Este é um esporte fascinante, bonito para se ver e incrivelmente prazeroso de
    se praticar.


    Para muitos uma filosofia de vida, um estilo, uma devoção a este esporte que uni
    força e concentração, técnica e resistência, domínio de técnicas específicas e
    uso de equipamentos, além de proporcionar um intimo contato com a natureza.


    Dividido em estilos e modalidades a escalada é pessoal, superação dos próprios
    limites, aliado a busca da essência deste esporte e o prazer que ele pode proporcionar.


    Que possamos encontrar este fluxo e sentir está essência...


    Boas escaladas...


    Marcus Vinicius'
- titulo: Regras e Código de Conduta
  conteudo: '![Regras](imagens/pagina_6_imagem_0.webp)

    Marcus "Rufino" escalando a via "Fósseis do velho mundo", uma ótima opção para
    quem gosta de escalar vias com proteções móveis.

    Foto: Elton Soares


    ### Regras de Segurança do Sítio Do Rod:


    * Muita atenção com a segurança sua e de seu parceiro

    * É importante conferir seus equipamentos e de seu parceiro antes de começar a
    escalar

    * Use Capacete

    * Muito cuidado com Abelhas, Cobras e Aranhas


    Somente pratique escalada se já tiver o domínio de uso dos equipamentos ou acompanhado
    por um instrutor qualificado.


    ### Código de conduta do visitante:


    * Respeite os animais e o ambiente a sua volta

    * Proibido a retirada de plantas e pedras

    * Traga seu lixo de volta

    * É proibido o uso de aparelhos sonoros

    * Use os banheiros do camping

    * É necessário autorização para entrar nas Cavernas'
- titulo: O Sítio do Rod e Hospedagem
  conteudo: '# O Sítio do Rod:


    O Sítio está Localizado na região que é considerada um dos berços da escalada
    esportiva em Minas Gerais. Desde a abertura de suas primeiras vias, na segunda
    metade da década de 90, se destaca como um importante Campo Escola de escalada
    na região.

    Desde então o Sítio do Rod foi e continua sendo palco de inúmeras histórias de
    escaladores que por aqui passam e desfrutaram desse pequeno reduto da escalada
    esportiva mineira.


    Fica localizado a apenas 50 km do centro de Belo Horizonte e 16 km do Aeroporto
    Internacional de Confins.

    Possui hoje cerca de 70 vias de escalada entre esportivas e móveis com graduações
    que vão do 4° ao 10° grau, com qualidade e variedade de estilos e algumas vias
    se mantém secas mesmo nos dias mais chuvosos.

    É muito fácil o acesso aos setores de escalada, são cerca de cinco minutos de
    caminhada do estacionamento até a base da Rocha, com isso também se torna perfeito
    para as Crianças terem seus primeiros contatos com a escalada e vivências em ambiente
    de natureza.


    A proximidade com outras áreas de escalada como a Lapa do Seu Antão, as Grutas
    da Lapinha e do Baú e Serra do Cipó, formando assim o maior circuito de escalada
    em Calcário do Brasil, atraindo escaladores de todas as partes do país e do mundo
    inteiro.


    ![Hospedagem](imagens/pagina_7_imagem_0.webp)

    **LUGAR PRA DORMIR**

    Container Hostel & Camping

    TEL 31. 99312-3748

    Rua Nossa Senhora do Rosário, 333 - Lapinha - Lagoa Santa - MG


    * Vestiários masculino e feminino

    * Cozinha de uso coletivo com geladeira

    * Churrasqueira

    * Fogão a gás

    * Lanchonete

    * Cervejas artesanais

    * Fogão a lenha

    * Banheiros'
- titulo: Parque Estadual do Sumidouro
  conteudo: '![Parque Estadual do Sumidouro](imagens/pagina_8_imagem_0.webp)

    Escaladores Dimitri e Bernado durante o curso básico de escalada em rocha.

    Foto: Marcus "Rufino"


    # Parque Estadual do Sumidouro:


    Caracterizado como Unidade de Proteção Integral, O Parque tem o objetivo principal
    de promover a preservação ambiental e cultural, possibilitando atividades de pesquisa,
    conservação, educação ambiental e turismo.


    A unidade recebeu este nome devido a sua lagoa, que possui um ponto de drenagem
    das águas da bacia típica dos terrenos calcários. Trata-se de uma abertura natural
    para uma rede de galerias, por meio da qual um curso d''água penetra no subsolo
    denominado "sumidouro", termo que vem da palavra indígena "Anhanhonhacanhuva",
    que significa "água parada que some no buraco da terra".


    **Algumas das atividades oferecidas pelo Parque:**


    Visita a Gruta da Lapinha, com acompanhamento de um guia especializado, onde turistas
    entre crianças e adultos podem conhecer um pouco do fantástico mundo das cavernas
    e seus arredores, com direito a entrada no Museu Peter Lund; Circuito Lapinha;
    Trilha Sumidouro; Escalada; Trilha da Travessia.


    Mais informações: www.pesumidouro.blogspot.com

    Telefone: (31) 3689 8592'
- titulo: APA Carste Lagoa Santa
  conteudo: '# APA Carste Lagoa Santa:


    O **Sítio do Rod** fica na Lapinha em Lagoa Santa MG, que é uma das regiões brasileiras
    mais importantes em termos de paisagens cárstica carbonática e da história das
    ciências naturais do Brasil.


    Nesta região foram encontrados grande quantidade de fósseis de animais extintos
    da megafauna como Preguiças gigantes, Tigres dentes-de-sabre, bem como vestígios
    de fosseis humanos, o padrão morfológico definido como Homem de Lagoa santa esta
    fauna extinta viveu na região nos períodos entre 13,5 a 9,5 mil anos atrás.


    Grande parte destas descobertas se deve ao trabalho do naturalista dinamarquês
    Peter Wilhelm Lund e outros estudiosos que por aqui passaram e outros que ainda
    estudam sobre a região nos dias atuais.


    ![APA Carste](imagens/pagina_9_imagem_0.webp)

    **Setor G1**, tem ótimas vias e boulder. Porem é necessário manter o silêncio
    e prestar muita atenção quanto a presença de abelhas.

    Foto: **Jean Carlos**'
- titulo: Comércio Local
  conteudo: '# Comércio local:


    * **Bar da Neri:**

    Serve bebidas, tira gostos e almoço. Este é o bar tem mais de 20 anos e fica a
    200 metros da entrada do Sítio é o mais clássico para os escaladores, onde a Senhora
    Neri faz questão de receber muito bem! funciona de terça a domingo das 11:00 as
    22:00


    * **Casa da Jacque:**

    Oferece almoço, produtos artesanais, aluguel de cavalos, UBER. Funciona de segunda
    a sexta para almoço e jantar, aos fins de semana com reservas.

    Endereço: Rua São Vicente de Paula 181


