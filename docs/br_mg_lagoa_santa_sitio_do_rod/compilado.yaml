- titulo: Aviso
  conteudo: '# AVISO:


    A escalada em rocha é um esporte que envolve riscos. Praticá-la implica em assumir
    a possibilidade de ocorrência de acidente grave ou mesmo a morte.


    As informações contidas neste guia, vem para auxiliar, informar e ajudar na segurança
    do esporte, estas informações são destinadas a escaladores que já possuem bom
    nível de conhecimento das técnicas de escalada em rocha e domínio de uso dos equipamentos
    de segurança.


    Lembrando que acidentes acontecem tanto com escaladores inexperientes quanto com
    os experientes, por isso é importantíssimo que todos sigam as regras de segurança
    do **Sítio do ROD**.


    Se você ainda não sabe escalar ou escala e não domina bem as técnicas verticais
    de uso de equipamentos, é fundamental o acompanhamento de um instrutor de escalada
    profissional qualificado.


    Existem cursos básicos, avançados, auto resgate, reciclagem de conhecimento das
    técnicas verticais e primeiros socorros.


    Sua segurança é sua responsabilidade, respeite seus limites e seja prudente.'
