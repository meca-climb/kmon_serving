name: Deploy aresta-db data

on:
  repository_dispatch:
    types: [aresta-db-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0'

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Gerar Token do GitHub App
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          owner: aresta-climb

      - name: Clonar aresta_db (somente a pasta generated do último commit)
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/aresta-climb/".insteadOf "https://github.com/aresta-climb/"
          git clone --depth 1 --filter=blob:none --sparse "https://github.com/aresta-climb/aresta_db.git" aresta_db
          cd aresta_db
          git sparse-checkout set generated
          cd ..
          git config --global --unset url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/aresta-climb/".insteadOf
          echo "aresta_db HEAD: $(git -C aresta_db rev-parse --short HEAD)"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar pasta no GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: aresta_db/generated/

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
