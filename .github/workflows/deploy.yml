name: Deploy kmon-db data

on:
  repository_dispatch:
    types: [kmon-db-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Clonar kmon_db (com submodulo kmon_api)
        env:
          KMON_DB_READ: ${{ secrets.KMON_DB_READ }}
        run: |
          git config --global url."https://x-access-token:${KMON_DB_READ}@github.com/acecmg/".insteadOf "https://github.com/acecmg/"
          git clone --depth 1 --filter=blob:none --sparse "https://github.com/acecmg/kmon_db.git" kmon_db
          cd kmon_db
          git sparse-checkout set generated
          cd ..
          git config --global --unset url."https://x-access-token:${KMON_DB_READ}@github.com/acecmg/".insteadOf
          echo "kmon_db HEAD: $(git -C kmon_db rev-parse --short HEAD)"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar pasta no GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: kmon_db/generated/

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
