name: Deploy kmon-db data

on:
  repository_dispatch:
    types: [kmon-db-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Clonar kmon_db (com submodulo kmon_api)
        env:
          KMON_DB_READ: ${{ secrets.KMON_DB_READ }}
        run: |
          git config --global url."https://x-access-token:${KMON_DB_READ}@github.com/acecmg/".insteadOf "https://github.com/acecmg/"
          git clone --recurse-submodules "https://github.com/acecmg/kmon_db.git" kmon_db
          git config --global --unset url."https://x-access-token:${KMON_DB_READ}@github.com/acecmg/".insteadOf
          echo "kmon_db HEAD: $(git -C kmon_db rev-parse --short HEAD)"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kmon_db/requirements-deploy.txt

      - name: Instalar dependências de deploy
        run: pip install -r kmon_db/requirements-deploy.txt

      - name: Executar deploy_generated.py
        run: |
          cd kmon_db
          python scripts/deploy_generated.py \
            --url-base "https://acecmg.github.io/kmon_serving" \
            --output-dir "../docs/"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Publicar pasta docs/ no GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
