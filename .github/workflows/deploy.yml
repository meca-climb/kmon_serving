name: Deploy kmon-db data

on:
  repository_dispatch:
    types: [kmon-db-updated]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout kmon_serving (com submódulo kmon_db)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Atualizar submódulo kmon_db para o commit mais recente
        run: |
          git submodule update --remote --merge kmon_db
          echo "kmon_db HEAD: $(git -C kmon_db rev-parse HEAD)"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: kmon_db/requirements-deploy.txt

      - name: Instalar dependências de deploy
        run: pip install -r kmon_db/requirements-deploy.txt

      - name: Executar deploy_generated.py
        run: |
          cd kmon_db
          python scripts/deploy_generated.py \
            --url-base "https://acecmg.github.io/kmon_serving" \
            --output-dir "../"

      - name: Commitar e publicar no GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add kmon_db
          git add --all

          if git diff --cached --quiet; then
            echo "Sem mudancas, nada a publicar."
          else
            KMON_DB_SHA=$(git -C kmon_db rev-parse --short HEAD)
            git commit -m "chore: deploy kmon_db@${KMON_DB_SHA}"
            git push
            echo "Deploy publicado com sucesso."
          fi
